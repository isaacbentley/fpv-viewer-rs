name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: fpv-viewer-linux-rpi5
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fpv-viewer-windows-x86_64.exe
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: fpv-viewer-macos-x86_64
            ext: ""

    steps:
      - uses: actions/checkout@v7

      - name: Install Cross-Compilation Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture arm64
          # Remove some conflicting apt sources if necessary, but standard ubuntu-latest is usually clean
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config
          # Install the arm64 versions of our SDR and UI dependencies
          sudo apt-get install -y libuhd-dev:arm64 libasound2-dev:arm64 libiio-dev:arm64 libfontconfig1-dev:arm64
          
          # Tell cargo which linker to use for aarch64
          mkdir -p .cargo
          cat <<EOF > .cargo/config.toml
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF
          
          # Point pkg-config to the arm64 sysroot
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_DIR=" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      # For Windows and Linux, just upload the binary
      - name: Upload Binary (Windows/Linux)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/fpv-viewer${{ matrix.ext }}

      # For macOS, package as DMG to follow global preference
      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p FPVViewer
          cp target/${{ matrix.target }}/release/fpv-viewer FPVViewer/
          hdiutil create -volname "FPVViewer" -srcfolder FPVViewer -ov -format UDZO fpv-viewer-macos-x86_64.dmg

      - name: Upload DMG (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: fpv-viewer-macos-x86_64.dmg
          path: fpv-viewer-macos-x86_64.dmg
